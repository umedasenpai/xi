<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Pond</title>
    <style>
        :root {
            --pond-blue: #a2d2ff;
            --grass-green: #ccd5ae;
            --ripple: rgba(255, 255, 255, 0.4);
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--grass-green);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* The Pond */
        .pond {
            position: relative;
            width: 80vw;
            height: 60vh;
            background-color: var(--pond-blue);
            border-radius: 50% 40% 60% 30% / 40% 50% 30% 60%;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.05);
            border: 8px solid #bde0fe;
        }

        /* The Duck */
        .duck {
            position: absolute;
            font-size: 3rem;
            cursor: pointer;
            user-select: none;
            z-index: 10;
            transition: transform 0.2s;
            /* Animation for swimming movement */
            animation: 
                swim 12s infinite linear,
                bob 2s infinite ease-in-out;
        }

        .duck:hover {
            transform: scale(1.2);
        }

        /* Movement Paths */
        @keyframes swim {
            0% { left: 10%; top: 20%; transform: scaleX(1); }
            25% { left: 70%; top: 30%; transform: scaleX(1); }
            26% { transform: scaleX(-1); } /* Turn around */
            50% { left: 50%; top: 70%; transform: scaleX(-1); }
            75% { left: 20%; top: 50%; transform: scaleX(-1); }
            76% { transform: scaleX(1); } /* Turn around */
            100% { left: 10%; top: 20%; transform: scaleX(1); }
        }

        /* Gentle bobbing effect */
        @keyframes bob {
            0%, 100% { margin-top: 0; }
            50% { margin-top: 10px; }
        }

        /* Decorative Lily Pads */
        .lily-pad {
            position: absolute;
            width: 50px;
            height: 40px;
            background-color: #588157;
            border-radius: 50%;
            opacity: 0.8;
        }

        .lily-pad::after {
            content: '';
            position: absolute;
            background-color: var(--pond-blue);
            width: 15px;
            height: 15px;
            right: -5px;
            top: 10px;
            border-radius: 50%;
        }

        .lp1 { top: 20%; left: 60%; }
        .lp2 { bottom: 25%; left: 30%; }
        .lp3 { top: 60%; left: 75%; }

        .title {
            position: absolute;
            top: 20px;
            color: #52796f;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h2 class="title">Just Keep Swimming</h2>

    <div class="pond">
        <!-- Decoration -->
        <div class="lily-pad lp1"></div>
        <div class="lily-pad lp2"></div>
        <div class="lily-pad lp3"></div>

        <!-- The Duck -->
        <div class="duck" id="duck">🦆</div>
    </div>

    <script>
        const duck = document.getElementById('duck');
        
        // Add a little quack sound effect when clicked (visual only)
        duck.addEventListener('click', () => {
            const bubble = document.createElement('div');
            bubble.innerText = 'Quack!';
            bubble.style.position = 'absolute';
            bubble.style.left = duck.offsetLeft + 'px';
            bubble.style.top = (duck.offsetTop - 20) + 'px';
            bubble.style.color = 'white';
            bubble.style.fontWeight = 'bold';
            bubble.style.pointerEvents = 'none';
            
            document.querySelector('.pond').appendChild(bubble);
            
            setTimeout(() => {
                bubble.remove();
            }, 1000);
        });
    </script>
</body>
</html>
